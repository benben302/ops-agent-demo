<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>AI运营助手 · Demo</title>
<style>
  :root{
    --bg:#0f1115; --panel:#171a21; --panel2:#1e222b; --border:#2a2f3a;
    --text:#e8eaed; --muted:#8b93a3; --blue:#4d8dff; --green:#3ecf8e;
    --orange:#f5a623; --radius:14px;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  body{margin:0; font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;
    background:var(--bg); color:var(--text); font-size:14px;}
  .app{max-width:480px; margin:0 auto; min-height:100vh; display:flex; flex-direction:column; background:var(--panel);}

  /* Header */
  .topbar{padding:14px 16px; border-bottom:1px solid var(--border); position:sticky; top:0; background:var(--panel); z-index:10;}
  .topbar h1{font-size:15px; margin:0 0 2px; font-weight:600;}
  .topbar .sub{font-size:11px; color:var(--muted);}
  .badge{display:inline-block; font-size:10px; padding:2px 7px; border-radius:20px; background:#2a2f3a; color:var(--orange); margin-left:6px; vertical-align:middle;}

  /* Views */
  .view{display:none; flex:1; flex-direction:column; overflow:hidden;}
  .view.active{display:flex;}

  /* Company list view */
  #companyListView{padding:12px;}
  .search-box{background:var(--panel2); border:1px solid var(--border); border-radius:10px; padding:10px 12px;
    display:flex; align-items:center; gap:8px; margin-bottom:12px;}
  .search-box input{background:none; border:none; outline:none; color:var(--text); font-size:14px; flex:1;}
  .search-box input::placeholder{color:var(--muted);}
  .hint{font-size:11px; color:var(--muted); margin:0 2px 10px;}
  .company-card{background:var(--panel2); border:1px solid var(--border); border-radius:var(--radius);
    padding:13px 14px; margin-bottom:10px; cursor:pointer; transition:border-color .15s;}
  .company-card:active{border-color:var(--blue);}
  .company-card .name{font-size:14px; font-weight:600; margin-bottom:6px;}
  .tag{display:inline-block; font-size:11px; padding:2px 8px; border-radius:20px; margin-right:5px; margin-top:4px;}
  .tag.blue{background:rgba(77,141,255,.15); color:var(--blue);}
  .tag.green{background:rgba(62,207,142,.15); color:var(--green);}
  .tag.gray{background:rgba(139,147,163,.15); color:var(--muted);}
  .company-card .desc{font-size:12px; color:var(--muted); margin-top:6px; line-height:1.5;}

  /* Chat view */
  #chatView{position:relative;}
  .chat-header{padding:12px 14px; border-bottom:1px solid var(--border); display:flex; align-items:center; gap:10px;}
  .back-btn{background:var(--panel2); border:1px solid var(--border); color:var(--text); width:30px; height:30px;
    border-radius:8px; font-size:16px; display:flex; align-items:center; justify-content:center; flex-shrink:0;}
  .chat-header .info{flex:1; min-width:0;}
  .chat-header .cname{font-size:14px; font-weight:600; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;}
  .chat-header .cmeta{font-size:11px; color:var(--muted); margin-top:2px;}

  .chat-area{flex:1; overflow-y:auto; padding:14px; display:flex; flex-direction:column; gap:12px;}
  .context-card{background:var(--panel2); border:1px solid var(--border); border-radius:var(--radius); padding:12px 13px; font-size:12px; color:var(--muted); line-height:1.7; white-space:pre-line;}
  .context-card b{color:var(--text);}

  .bubble{max-width:88%; padding:10px 13px; border-radius:14px; font-size:13.5px; line-height:1.6; white-space:pre-line;}
  .bubble.user{align-self:flex-end; background:var(--blue); color:#fff; border-bottom-right-radius:4px;}
  .bubble.img{align-self:flex-end; background:var(--panel2); border:1px dashed var(--border); color:var(--muted); font-size:12px;}

  .card{background:var(--panel2); border:1px solid var(--border); border-radius:var(--radius); padding:14px; align-self:stretch;}
  .card h3{font-size:12px; margin:0 0 8px; color:var(--muted); font-weight:600; letter-spacing:.3px;}
  .card .id-row{display:flex; flex-wrap:wrap; gap:6px; margin-bottom:8px;}
  .card .intent{font-size:12.5px; color:var(--text); line-height:1.6;}

  .speech-block{margin-top:10px; padding-top:10px; border-top:1px solid var(--border);}
  .speech-block .label{font-size:11px; color:var(--orange); font-weight:600; margin-bottom:6px; display:flex; align-items:center; gap:5px;}
  .speech-block .content{font-size:13px; line-height:1.7; color:var(--text); white-space:pre-line;}
  .copy-btn{margin-top:8px; background:none; border:1px solid var(--border); color:var(--muted); font-size:11px;
    padding:5px 10px; border-radius:8px;}
  .reason{font-size:11.5px; color:var(--muted); margin-top:10px; padding-top:10px; border-top:1px dashed var(--border); line-height:1.6;}

  .thinking{align-self:flex-start; display:flex; align-items:center; gap:8px; padding:10px 13px; background:var(--panel2);
    border-radius:14px; font-size:12px; color:var(--muted);}
  .dot{width:5px; height:5px; border-radius:50%; background:var(--muted); animation:blink 1.2s infinite;}
  .dot:nth-child(2){animation-delay:.2s;} .dot:nth-child(3){animation-delay:.4s;}
  @keyframes blink{0%,80%,100%{opacity:.3;} 40%{opacity:1;}}

  .save-toast{position:absolute; bottom:80px; left:50%; transform:translateX(-50%); background:var(--green); color:#08130d;
    padding:8px 18px; border-radius:20px; font-size:12.5px; font-weight:600; opacity:0; pointer-events:none; transition:opacity .25s, transform .25s;}
  .save-toast.show{opacity:1; transform:translateX(-50%) translateY(-6px);}

  /* Quick replies */
  .quick-row{padding:0 14px 6px; display:flex; gap:8px; overflow-x:auto;}
  .quick-chip{flex-shrink:0; background:var(--panel2); border:1px solid var(--border); color:var(--muted);
    font-size:11.5px; padding:6px 11px; border-radius:16px; white-space:nowrap;}
  .quick-chip:active{border-color:var(--blue); color:var(--blue);}

  /* Input bar */
  .input-bar{padding:10px 12px; border-top:1px solid var(--border); display:flex; gap:8px; align-items:flex-end;}
  .input-bar textarea{flex:1; background:var(--panel2); border:1px solid var(--border); border-radius:12px; color:var(--text);
    font-size:13.5px; padding:10px 12px; resize:none; outline:none; max-height:90px; font-family:inherit;}
  .input-bar textarea::placeholder{color:var(--muted);}
  .send-btn{background:var(--blue); border:none; color:#fff; width:38px; height:38px; border-radius:50%; flex-shrink:0;
    display:flex; align-items:center; justify-content:center; font-size:16px;}
  .send-btn:disabled{opacity:.4;}
  .save-btn{background:var(--green); border:none; color:#08130d; font-size:12px; font-weight:600; padding:8px 14px;
    border-radius:10px; flex-shrink:0;}

  .footer-note{padding:10px 14px 16px; font-size:10.5px; color:var(--muted); text-align:center; line-height:1.6; border-top:1px solid var(--border);}
  .footer-note a{color:var(--blue); text-decoration:none;}

  ::-webkit-scrollbar{width:0; height:0;}
</style>
</head>
<body>
<div class="app">

  <div class="topbar">
    <h1>AI运营助手 <span class="badge">DEMO</span></h1>
    <div class="sub">企业识别 · 话术生成 · 跟进档案自动化（示例数据，非真实企业）</div>
  </div>

  <!-- 企业列表页 -->
  <div class="view active" id="companyListView">
    <div class="search-box">
      <span>🔍</span>
      <input id="searchInput" placeholder="输入企业名搜索，或直接点下方卡片" oninput="filterCompanies()">
    </div>
    <div class="hint">👇 点击任意企业，体验完整的"加载档案 → 粘贴消息 → AI生成话术 → 保存"流程</div>
    <div id="companyList"></div>
  </div>

  <!-- 对话页 -->
  <div class="view" id="chatView">
    <div class="chat-header">
      <button class="back-btn" onclick="goBack()">←</button>
      <div class="info">
        <div class="cname" id="chatCName">—</div>
        <div class="cmeta" id="chatCMeta">—</div>
      </div>
    </div>

    <div class="chat-area" id="chatArea"></div>

    <div class="quick-row" id="quickRow"></div>

    <div class="input-bar">
      <textarea id="msgInput" rows="1" placeholder="粘贴企业微信消息…" oninput="autoGrow(this)"></textarea>
      <button class="send-btn" id="sendBtn" onclick="sendMessage()">➤</button>
    </div>

    <div class="save-toast" id="saveToast">✓ 已保存并更新台账</div>
  </div>

  <div class="footer-note" id="footerNote"></div>
</div>

let currentCompany = null;

function renderCompanyList(filter=''){
  const el = document.getElementById('companyList');
  const list = COMPANIES.filter(c => !filter || c.name.includes(filter) || c.alias.includes(filter));
  if(list.length === 0){
    el.innerHTML = '<div style="text-align:center;color:var(--muted);font-size:12px;padding:30px 0">无匹配企业</div>';
    return;
  }
  el.innerHTML = list.map(c => `
    <div class="company-card" onclick="openCompany(${c.id})">
      <div class="name">${c.name}</div>
      <div>
        <span class="tag ${c.type==='服务商'?'blue':'green'}">${c.type}</span>
        <span class="tag gray">${c.industry || c.demand}</span>
        <span class="tag gray">${c.status}</span>
      </div>
      <div class="desc">最近：${c.history[c.history.length-1].text}</div>
    </div>
  `).join('');
}

function filterCompanies(){
  renderCompanyList(document.getElementById('searchInput').value.trim());
}

function openCompany(id){
  currentCompany = COMPANIES.find(c => c.id === id);
  document.getElementById('companyListView').classList.remove('active');
  document.getElementById('chatView').classList.add('active');
  document.getElementById('chatCName').textContent = currentCompany.name;
  document.getElementById('chatCMeta').textContent =
    `${currentCompany.type} · ${currentCompany.industry || currentCompany.demand} · ${currentCompany.status}`;

  const area = document.getElementById('chatArea');
  const histLines = currentCompany.history.map(h => `  · ${h.date}：${h.text}`).join('\n');
  area.innerHTML = `
    <div class="context-card">
<b>【已加载企业档案】</b>
企业：${currentCompany.name}
类型：${currentCompany.type} | ${currentCompany.industry || currentCompany.demand}
状态：${currentCompany.status} | 联系人：${currentCompany.contact}
本地企业：${currentCompany.isLocal ? '是' : '否'} | B2B：${currentCompany.isB2B ? '是' : '否'}
最近沟通：
${histLines}
下一步：${currentCompany.nextAction}
    </div>
  `;

  const qrow = document.getElementById('quickRow');
  qrow.innerHTML = currentCompany.quickMsgs.map(m =>
    `<div class="quick-chip" onclick="fillMsg('${m.replace(/'/g,"\\'")}')">${m.length>16 ? m.slice(0,16)+'…' : m}</div>`
  ).join('');

  document.getElementById('msgInput').value = '';
  document.getElementById('footerNote').innerHTML =
    `本页面全部数据为演示用虚构内容，不接入任何真实企业信息或线上 AI 接口。<br>完整版本地部署架构：<a href="#" onclick="return false">GitHub 项目说明 →</a>`;
}

function goBack(){
  document.getElementById('chatView').classList.remove('active');
  document.getElementById('companyListView').classList.add('active');
}

function fillMsg(text){
  const input = document.getElementById('msgInput');
  input.value = text;
  autoGrow(input);
}

function autoGrow(el){
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 90) + 'px';
}

function pickResponseKey(message){
  const m = message.toLowerCase();
  if(currentCompany.id === 1){
    if(/材料|资料|上架|提交/.test(message)) return 'materials';
    if(/多久|时间|周期|审核/.test(message)) return 'timeline';
  }
  if(currentCompany.id === 2){
    if(/质检|漏检|检测|视觉|产线/.test(message)) return 'quality';
    if(/补贴|申请|多少钱|成本/.test(message)) return 'subsidy';
  }
  if(currentCompany.id === 3){
    if(/活动|对接会|报名/.test(message)) return 'event';
  }
  return 'default';
}

async function sendMessage(){
  const input = document.getElementById('msgInput');
  const message = input.value.trim();
  if(!message) return;

  const area = document.getElementById('chatArea');
  const sendBtn = document.getElementById('sendBtn');
  sendBtn.disabled = true;

  const userBubble = document.createElement('div');
  userBubble.className = 'bubble user';
  userBubble.textContent = message;
  area.appendChild(userBubble);
  input.value = '';
  autoGrow(input);
  area.scrollTop = area.scrollHeight;

  const thinking = document.createElement('div');
  thinking.className = 'thinking';
  thinking.innerHTML = '<span>AI 分析中</span><span class="dot"></span><span class="dot"></span><span class="dot"></span>';
  area.appendChild(thinking);
  area.scrollTop = area.scrollHeight;

  await sleep(900 + Math.random()*500);

  const key = pickResponseKey(message);
  const r = currentCompany.responses[key];
  thinking.remove();

  const card = document.createElement('div');
  card.className = 'card';
  card.innerHTML = `
    <h3>🔍 企业识别</h3>
    <div class="id-row">
      <span class="tag blue">${currentCompany.type}</span>
      <span class="tag green">${currentCompany.industry || currentCompany.demand}</span>
    </div>
    <div class="intent">${r.intent}<br><span style="color:var(--muted);font-size:11.5px">依据：${r.basis.join('；')}</span></div>

    <div class="speech-block">
      <div class="label">💬 主推话术</div>
      <div class="content">${r.main}</div>
    </div>
    <div class="speech-block">
      <div class="label" style="color:var(--blue)">💬 备选话术</div>
      <div class="content">${r.alt}</div>
    </div>
    <div class="reason">建议理由：${r.reason}</div>
    <button class="copy-btn" onclick="saveConversation('${key}')">✓ 保存本次沟通</button>
  `;
  area.appendChild(card);
  area.scrollTop = area.scrollHeight;
  sendBtn.disabled = false;
}

function saveConversation(key){
  const r = currentCompany.responses[key];
  const today = new Date();
  const dateStr = `${String(today.getMonth()+1).padStart(2,'0')}-${String(today.getDate()).padStart(2,'0')}`;
  currentCompany.history.push({ date: dateStr, text: r.intent });
  currentCompany.nextAction = "跟进对方后续回复，视情况推进下一步";

  const toast = document.getElementById('saveToast');
  toast.classList.add('show');
  setTimeout(()=> toast.classList.remove('show'), 1800);
}

function sleep(ms){ return new Promise(res => setTimeout(res, ms)); }

renderCompanyList();
</script>
</body>
</html>
